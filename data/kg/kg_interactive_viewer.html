  size: sizeMap[n.type] || 15, font: { color: '#eee', size: n.type==='Alternative' ? 8 : 11 },
  title: n.title || n.label, nodeType: n.type, proposalTitle: n.title
})));

const visEdges = new vis.DataSet(edgesData.map((e,i) => ({
  id: i, from: e.from, to: e.to, color: { color: '#444', opacity: 0.4 },
  width: 0.5, arrows: { to: { scaleFactor: 0.3 } }
})));

const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
  physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.008, springLength: 120 }, stabilization: { iterations: 200 } },
  interaction: { hover: true, tooltipDelay: 100 },
});

network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = visNodes.get(nodeId);
    const edges = network.getConnectedEdges(nodeId);
    const neighbors = network.getConnectedNodes(nodeId);
    let html = '<b>' + node.label + '</b><br>Type: ' + node.nodeType + '<br>Connections: ' + neighbors.length;
    if (node.proposalTitle) html += '<br><br>제안명: ' + node.proposalTitle;
    document.getElementById('info').innerHTML = html;

});
